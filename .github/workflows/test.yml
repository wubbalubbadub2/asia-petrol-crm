name: Tests
on:
  push:
    branches: [main, qa-audit]
  pull_request:
    branches: [main]

jobs:
  # Fast unit tests: vitest + parser tests + TypeScript build.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  # Database tests: spin up Postgres, apply every migration in order, run
  # the SQL test suite. Catches trigger / RLS / constraint regressions
  # before they hit production.
  db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      # Apply Supabase's minimal auth/storage scaffold that our migrations
      # reference (auth.users, auth.uid(), profiles FKs, etc.). We stub
      # these just enough to let the migrations run outside Supabase Cloud.
      - name: Stub Supabase auth schema
        run: |
          psql "$DATABASE_URL" <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY,
            email TEXT,
            encrypted_password TEXT,
            email_confirmed_at TIMESTAMPTZ,
            aud TEXT,
            role TEXT,
            instance_id UUID,
            raw_app_meta_data JSONB DEFAULT '{}'::jsonb,
            raw_user_meta_data JSONB DEFAULT '{}'::jsonb,
            created_at TIMESTAMPTZ DEFAULT now()
          );
          -- auth.uid() reads the JWT claims GUC the same way Supabase does
          -- in production. Tests that don't touch the GUC see NULL;
          -- tests that set request.jwt.claims (e.g. 07_rls_matrix) get
          -- back a real uuid so the RLS helpers evaluate correctly.
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS UUID
            LANGUAGE sql STABLE AS $$
              SELECT NULLIF(
                current_setting('request.jwt.claims', true)::json->>'sub',
                ''
              )::uuid
            $$;
          -- `authenticated` is the Postgres role PostgREST assigns to
          -- logged-in requests in real Supabase. Create it as a no-op so
          -- `SET LOCAL role = authenticated` inside tests doesn't error.
          DO $DO$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated;
            END IF;
          END $DO$;
          SQL

      - name: Apply all migrations in order
        run: |
          for f in supabase/migrations/*.sql; do
            echo "▶ $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" > /dev/null
          done

      - name: Run DB test suite
        run: ./supabase/tests/run.sh

  # End-to-end smoke test. Runs against a real Supabase project using
  # credentials stored as GitHub repo secrets. Skipped (as a pass) if the
  # secrets aren't configured — see e2e/smoke.spec.ts for the skip logic.
  e2e:
    runs-on: ubuntu-latest
    # Only run on main branch pushes; pull-requests from forks don't get
    # access to secrets so the spec would skip anyway.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
